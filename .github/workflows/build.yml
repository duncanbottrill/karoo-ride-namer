name: Build

on:
  workflow_dispatch:
  push:
    branches: [ "**" ]
    tags: [ "v*" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # karoo-ext lives on GitHub Packages. The default GITHUB_TOKEN can read the
      # public package; override with repo secrets GPR_USER/GPR_KEY if your org
      # policy blocks cross-org package reads.
      - name: Configure karoo-ext package credentials
        run: |
          echo "GPR_USER=${{ secrets.GPR_USER || github.actor }}" >> "$GITHUB_ENV"
          echo "GPR_KEY=${{ secrets.GPR_KEY || secrets.GITHUB_TOKEN }}" >> "$GITHUB_ENV"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Build and test
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease testDebugUnitTest

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: app/build/outputs/apk/release/app-release.apk

      # On a version tag (e.g. v1.0), publish the signed APK to a GitHub Release so it
      # can be sideloaded onto the Karoo and updated in place.
      - name: Publish release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: app/build/outputs/apk/release/app-release.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
